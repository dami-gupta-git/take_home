[tool.ruff]
line-length = 100
target-version = "py311"
exclude = ["retrosynthesis_search.py", "models.py", "tests/"]

[tool.ruff.lint]
select = ["E", "F", "I", "UP"]

[tool.mypy]
python_version = "3.11"
strict = true
ignore_missing_imports = true
exclude = ["retrosynthesis_search\\.py", "models\\.py", "tests/", "alembic/"]
plugins = ["pydantic.mypy"]

[tool.pytest.ini_options]
pythonpath = ["."]
testpaths = ["tests"]
addopts = "-v"
